<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="UTF-8" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-G3HQX0SYHS"></script>
  <script src="../analytics.js"></script>

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Official logo design brief for Great Lantern Festival — modular branding, Hội An lantern art, West Coast logotype, and proof-of-human-artistry audit trail." />
  <title>Logo Design — Great Lantern Festival</title>
  <script src="../clean-urls.js"></script>
  <script>
    (function () {
      try {
        var t = sessionStorage.getItem("maf-theme");
        if (t === "light" || t === "dark") document.documentElement.setAttribute("data-theme", t);
      } catch (_) {}
    })();
  </script>
  <link rel="stylesheet" href="../site.css" />
</head>
<body>
  <div id="site-nav"></div>
  <main class="page-wrap page-wrap--doc" id="main">
    <p class="muted">Loading…</p>
  </main>
  <div id="site-footer"></div>
  <script src="../doc-scroll.js"></script>
  <script src="../site.js"></script>
  <script>
    (async function () {
      const { initPageShell, loadSiteData, mountFooter, renderLogoDesignPage, initPageToc, setPageTitle, escapeHtml } =
        window.MafSite;
      initPageShell("logo-design");
      try {
        const site = await loadSiteData();
        const brief = site.logoDesign;
        setPageTitle(site, brief?.meta?.pageTitle ?? "Logo Design");
        if (brief?.meta?.description) {
          document.querySelector('meta[name="description"]').setAttribute("content", brief.meta.description);
        }
        document.getElementById("main").innerHTML = renderLogoDesignPage(brief);
        initPageToc();
        mountFooter(site);
      } catch (err) {
        document.getElementById("main").innerHTML = `<p class="error-panel">${escapeHtml(err.message)}</p>`;
      }
    })();
  </script>
</body>
</html>
