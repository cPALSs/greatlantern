<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="UTF-8" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-G3HQX0SYHS"></script>
  <script src="../../analytics.js"></script>

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Mid-Autumn Festival Season in Greater Sacramento — early September through early October events, including Great Lantern Festival." />
  <title>Mid-Autumn Festival Season — Great Lantern Festival</title>
  <script src="../../clean-urls.js"></script>
  <script>
    (function () {
      try {
        var t = sessionStorage.getItem("maf-theme");
        if (t === "light" || t === "dark") document.documentElement.setAttribute("data-theme", t);
      } catch (_) {}
    })();
  </script>
  <link rel="stylesheet" href="../../site.css" />
</head>
<body>
  <div id="site-nav"></div>
  <main class="page-wrap page-wrap--doc" id="main">
    <p class="muted">Loading…</p>
  </main>
  <div id="site-footer"></div>
  <script src="../../doc-scroll.js"></script>
  <script src="../../site.js"></script>
  <script>
    (async function () {
      const {
        initPageShell,
        loadSiteData,
        loadSeasonEvents,
        mountFooter,
        renderSeasonPage,
        initPageToc,
        setPageTitle,
        escapeHtml,
      } = window.MafSite;
      initPageShell("season");
      try {
        const [site, seasonData] = await Promise.all([loadSiteData(), loadSeasonEvents()]);
        setPageTitle(site, "Mid-Autumn Festival Season");
        document.getElementById("main").innerHTML = renderSeasonPage(site.season, seasonData);
        initPageToc();
        mountFooter(site);
      } catch (err) {
        document.getElementById("main").innerHTML = `<p class="error-panel">${escapeHtml(err.message)}</p>`;
      }
    })();
  </script>
</body>
</html>
