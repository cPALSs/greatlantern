  <title>Mid-Autumn Festival Season — Great Lantern Festival</title>
  <script src="../../clean-urls.js"></script>
  <script>
    (function () {
      try {
        var t = sessionStorage.getItem("maf-theme");
        if (t === "light" || t === "dark") document.documentElement.setAttribute("data-theme", t);
      } catch (_) {}
    })();
  </script>
  <link rel="stylesheet" href="../../site.css" />
</head>
<body>
  <div id="site-nav"></div>
  <main class="page-wrap page-wrap--doc" id="main">
    <div id="seo-prerender" class="seo-prerender">
      <section class="hero">
        <h1>Mid-Autumn Festival Season</h1>
        <p>Celebrate Mid-Autumn Festival Season in Greater Sacramento from early September through early October!</p>
        <p>Greater Sacramento's Mid-Autumn and Moon Festival calendar — community celebrations and our Elk Grove capstone weekend.</p>
      </section>
    </div>
  </main>
  <div id="site-footer"></div>
  <script src="../../doc-scroll.js"></script>
  <script src="../../site.js"></script>
  <script>
    (async function () {
      const {
        initPageShell,
        loadSiteData,
        loadSeasonEvents,
        mountFooter,
        renderSeasonPage,
        initPageToc,
        setPageTitle,
        escapeHtml,
      } = window.MafSite;
      initPageShell("season");
      try {
        const [site, seasonData] = await Promise.all([loadSiteData(), loadSeasonEvents()]);
        setPageTitle(site, "Mid-Autumn Festival Season");
        document.getElementById("main").innerHTML = renderSeasonPage(site.season, seasonData);
        initPageToc();
        mountFooter(site);
      } catch (err) {
        document.getElementById("main").innerHTML = `<p class="error-panel">${escapeHtml(err.message)}</p>`;
      }
    })();
  </script>
</body>
