<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-G3HQX0SYHS"></script>
  <script src="../../analytics.js"></script>

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Great Lantern Festival media — press coverage, ads, and festival videos." />
  <title>Media — Great Lantern Festival</title>
  <script src="../../clean-urls.js"></script>
  <script>
    (function () {
      try {
        var t = localStorage.getItem("maf-theme") || localStorage.getItem("maf2026-theme") || localStorage.getItem("build-theme");
        if (t === "light" || t === "dark" || t === "auto") document.documentElement.setAttribute("data-theme", t);
      } catch (_) {}
    })();
  </script>
  <link rel="stylesheet" href="../../site.css" />
</head>
<body>
  <div id="site-nav"></div>
  <main class="page-wrap page-wrap--doc" id="main">
    <p class="muted">Loading…</p>
  </main>
  <div id="site-footer"></div>
  <script src="../../site.js"></script>
  <script>
    (async function () {
      const {
        initPageShell,
        loadSiteData,
        mountFooter,
        renderMediaPage,
        initMediaPlayers,
        setPageTitle,
        escapeHtml,
      } = window.MafSite;
      initPageShell("media");
      try {
        const site = await loadSiteData();
        setPageTitle(site, "Media");
        document.getElementById("main").innerHTML = renderMediaPage(site.media);
        initMediaPlayers();
        mountFooter(site);
      } catch (err) {
        document.getElementById("main").innerHTML = `<p class="error-panel">${escapeHtml(err.message)}</p>`;
      }
    })();
  </script>
</body>
</html>
