<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="UTF-8" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-G3HQX0SYHS"></script>
  <script src="../analytics.js"></script>

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Join the team — open director and committee member roles for Great Lantern Festival (Sep 26, 2026) at Derr-Okamoto Park, Elk Grove." />
  <title>Team — Great Lantern Festival</title>
  <script src="../clean-urls.js"></script>
  <script>
    (function () {
      try {
        var t = sessionStorage.getItem("maf-theme");
        if (t === "light" || t === "dark") document.documentElement.setAttribute("data-theme", t);
      } catch (_) {}
    })();
  </script>
  <link rel="stylesheet" href="../site.css" />
</head>
<body>
  <div id="site-nav"></div>
  <main class="page-wrap page-wrap--doc" id="main">
    <p class="muted">Loading…</p>
  </main>
  <div id="site-footer"></div>
  <script src="../doc-scroll.js"></script>
  <script src="../site.js"></script>
  <script>
    (async function () {
      const { initPageShell, loadSiteData, mountFooter, renderTeamPage, initPageToc, setPageTitle, escapeHtml } =
        window.MafSite;
      initPageShell("team");
      try {
        const site = await loadSiteData();
        setPageTitle(site, "Team");
        document.getElementById("main").innerHTML = renderTeamPage(site);
        initPageToc();
        mountFooter(site);
      } catch (err) {
        document.getElementById("main").innerHTML = `<p class="error-panel">${escapeHtml(err.message)}</p>`;
      }
    })();
  </script>
</body>
</html>
