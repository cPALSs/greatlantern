      <section><h2>Tết Trung Thu</h2><p>Mid-Autumn Festival, known as Tết Trung Thu in Vietnamese culture, is a cherished celebration when families gather under the full moon. Children carry lanterns, share mooncakes, and drink tea — a night of reunion, gratitude, and hope.</p></section>

      initPageShell("about");
      try {
        const site = await loadSiteData();
        document.title = "About Great Lantern Festival";
        document.getElementById("main").innerHTML = renderAboutPage(site.about);
