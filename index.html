<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="UTF-8" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-G3HQX0SYHS"></script>
  <script src="analytics.js"></script>

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Great Lantern Festival — Saturday, Sep 26, 2026 at Derr-Okamoto Park, Elk Grove. Free admission 4–9 PM, lantern procession, volunteer recruitment, and sponsorship." />
  <title>Great Lantern Festival</title>
  <script src="clean-urls.js"></script>
  <script>
    (function () {
      try {
        var t = sessionStorage.getItem("maf-theme");
        if (t === "light" || t === "dark") document.documentElement.setAttribute("data-theme", t);
      } catch (_) {}
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="site.css" />
</head>
<body class="page-home">
  <div id="site-nav"></div>
  <main class="page-wrap" id="main">
    <p class="muted">Loading…</p>
  </main>
  <div id="site-footer"></div>
  <script src="doc-scroll.js"></script>
  <script src="site.js"></script>
  <script>
    (async function () {
      const { initPageShell, loadSiteData, mountFooter, renderEventSummary, setPageTitle, escapeHtml } = window.MafSite;
      initPageShell("home");
      try {
        const site = await loadSiteData();
        setPageTitle(site);
        const e = site.event;
        const h = site.hero;
        const c = site.cta;
        document.getElementById("main").innerHTML = `
          <div class="home-lead">
            <div class="home-lantern" aria-hidden="true">
              <img
                class="home-lantern__img home-lantern__img--dark"
                src="assets/lantern-dark.png"
                alt=""
                width="512"
                height="1024"
                decoding="async"
              />
              <img
                class="home-lantern__img home-lantern__img--light"
                src="assets/lantern-light.png"
                alt=""
                width="512"
                height="1024"
                decoding="async"
              />
            </div>
            <section class="hero">
              <h1 class="home-hero-title">${escapeHtml(e.name)}</h1>
              ${renderEventSummary(site)}
            </section>
            <p class="home-intro">${escapeHtml(h.intro)}</p>
            <section class="content-section home-recruit">
              <h2>${escapeHtml(h.headline)}</h2>
              <p>${escapeHtml(h.subhead)}</p>
              <p class="muted">${escapeHtml(h.body)}</p>
              <div class="cta-row">
                <a class="btn btn-primary" href="${escapeHtml(c.primaryHref)}">${escapeHtml(c.primaryLabel)}</a>
                <a class="btn btn-secondary" href="${escapeHtml(c.secondaryHref)}" target="_blank" rel="noopener">${escapeHtml(c.secondaryLabel)}</a>
              </div>
              ${h.ctaNote ? `<p class="muted">${escapeHtml(h.ctaNote)}</p>` : ""}
            </section>
          </div>
          <div class="home-cta-columns">
            <section class="content-section home-cta-column home-fund-cta">
              <h2>Fund The Festival</h2>
              <p>Vendor fees fund baseline operations. Sponsors unlock the blocks families remember — lantern procession, children's programming, Honor our Elders, and site lighting.</p>
              <div class="cta-row">
                <a class="btn btn-primary" href="${escapeHtml(c.buildHref)}">${escapeHtml(c.buildLabel)}</a>
              </div>
            </section>
            <section class="content-section home-cta-column home-popups-cta">
              <h2>Fund The Popups</h2>
              <p>Portable lantern photo activations across the autumn season — backdrops, craft stations, and family portraits at partner events while we grow the team.</p>
              <div class="cta-row">
                <a class="btn btn-primary" href="${escapeHtml(c.popupsHref)}">${escapeHtml(c.popupsLabel)}</a>
              </div>
            </section>
          </div>
          <div class="home-cta-columns">
            <div class="home-cta-column home-cta-stack">
              ${site.logoDesign?.homepageCta ? (() => {
                const lc = site.logoDesign.homepageCta;
                return `
              <section class="content-section home-logo-cta">
                <h2>${escapeHtml(lc.title)}</h2>
                <p>${escapeHtml(lc.body)}</p>
                <div class="cta-row">
                  <a class="btn btn-primary" href="${escapeHtml(lc.href)}">${escapeHtml(lc.buttonLabel)}</a>
                </div>
              </section>`;
              })() : ""}
            </div>
            ${site.hostActivations?.homepageCta ? (() => {
              const hc = site.hostActivations.homepageCta;
              return `
            <section class="content-section home-cta-column home-host-cta">
              <h2>${escapeHtml(hc.title)}</h2>
              <p>${escapeHtml(hc.body)}</p>
              <div class="cta-row">
                <a class="btn btn-primary" href="${escapeHtml(hc.href)}">${escapeHtml(hc.buttonLabel)}</a>
              </div>
            </section>`;
            })() : ""}
          </div>
        `;
        mountFooter(site);
      } catch (err) {
        document.getElementById("main").innerHTML = `<p class="error-panel">${escapeHtml(err.message)}</p>`;
      }
    })();
  </script>
</body>
</html>
