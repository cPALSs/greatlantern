<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="UTF-8" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-G3HQX0SYHS"></script>
  <script src="../analytics.js"></script>

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Custom Zones at Great Lantern Festival — your name on the map. Decorate your corner yourself or ask us to help bring it to life." />
  <title>Custom Zones — Great Lantern Festival</title>
  <script src="../clean-urls.js"></script>
  <script>
    (function () {
      try {
        var t = sessionStorage.getItem("maf-theme");
        if (t === "light" || t === "dark") document.documentElement.setAttribute("data-theme", t);
      } catch (_) {}
    })();
  </script>
  <link rel="stylesheet" href="../site.css" />
</head>
<body>
  <div id="site-nav"></div>
  <main class="page-wrap page-wrap--host" id="main">
    <p class="muted">Loading…</p>
  </main>
  <div id="site-footer"></div>
  <script src="../doc-scroll.js"></script>
  <script src="../site.js"></script>
  <script>
    (async function () {
      const { initPageShell, loadSiteData, loadSkuCatalog, mountFooter, renderHostActivations, initHostPageToc, initZoneCarousel, setPageTitle, escapeHtml } =
        window.MafSite;
      initPageShell("host");
      try {
        const [site, catalog] = await Promise.all([loadSiteData(), loadSkuCatalog()]);
        const ha = site.hostActivations;
        setPageTitle(site, ha?.meta?.pageTitle ?? "Custom Zones");
        if (ha?.meta?.description) {
          document.querySelector('meta[name="description"]').setAttribute("content", ha.meta.description);
        }
        document.getElementById("main").innerHTML = renderHostActivations(site, catalog);
        initHostPageToc(ha?.apply, ha?.prompts);
        initZoneCarousel();
        mountFooter(site);
      } catch (err) {
        document.getElementById("main").innerHTML = `<p class="error-panel">${escapeHtml(err.message)}</p>`;
      }
    })();
  </script>
</body>
</html>
